<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="darkreader-lock">
    <title>animation-editor</title>

    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/button.css">
    <link rel="stylesheet" href="styles/topbar.css">
    <link rel="stylesheet" href="styles/sidebar.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/view.css">
</head>
<body>
    
    <div class="app-wrapper">
        <header class="top-bar">
            <div class="top-bar-left">
                <button id="save">💾 Save</button>
                <button id="load">📥 Load</button>
                <button id="openImage">🌄 Open Image</button>
            </div>
            <div class="top-bar-center">
                <span class="top-hints">LMB Drag to select · Enter create frame · Enter+Number insert at N · RMB delete · MMB pan · Scroll zoom</span>
            </div>
            <div class="top-bar-right">
                <label class="grid-label">Grid</label>
                <input type="number" id="gridSize" class="grid-input" value="16" min="1" step="1">
            </div>
        </header>

        <div class="main-layout">
            <aside class="sidebar" id="sidebar">
                <div class="animations-panel">
                    <div class="anim-actions">
                        <button id="addAnimBtn">➕ Add Animation</button>
                    </div>
                    <div class="animation-list" id="animationList"></div>
                    <div class="preview-panel" id="previewPanel" style="display:none">
                        <div class="preview-controls">
                            <button id="previewPlay" title="Play">▶</button>
                            <button id="previewPause" title="Pause">⏸</button>
                            <span class="preview-label">Frame</span>
                            <input class="preview-frame" id="previewFrame" value="0" size="3">
                            <span class="preview-label">FPS</span>
                            <input type="number" id="previewSpeed" value="8" min="1" max="60" step="1">
                            <label class="preview-loop"><input type="checkbox" id="previewLoop" checked> ↻</label>
                        </div>
                        <canvas class="preview-canvas" id="previewCanvas"></canvas>
                    </div>
                </div>
            </aside>

            <div class="resizer" id="dragbar"></div>

            <main class="editor-view">
                <canvas id="view"></canvas>
            </main>
        </div>
    </div>

    <script src="scripts/global.js"></script>
    <script src="scripts/camera.js"></script>
    <script src="scripts/draw.js"></script>
    <script src="scripts/sidebar.js"></script>
    <script src="scripts/animations.js"></script>
    <script src="scripts/io.js"></script>
    <script src="scripts/interact.js"></script>

</body>
</html>
